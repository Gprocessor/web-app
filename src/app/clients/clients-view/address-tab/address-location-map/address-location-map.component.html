@if (hasValidCoordinates) {
  <div class="address-location-map">
    <h4>{{ 'labels.heading.Location Map' | translate }}</h4>
    <div #mapContainer class="map-container"></div>
    @if (tileLoadFailed) {
      <div class="map-error">{{ 'labels.text.Map tiles unavailable' | translate }}</div>
    }
  </div>
}
