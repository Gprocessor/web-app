<ng-container *ngFor="let p of prompts; trackBy: trackByPrompt">
  <button
    *ngIf="outline"
    type="button"
    mat-stroked-button
    class="prompt-chip prompt-chip--outline"
    (click)="selected.emit(p)"
  >
    {{ p }}
  </button>
  <button *ngIf="!outline" type="button" mat-button class="prompt-chip" (click)="selected.emit(p)">
    {{ p }}
  </button>
</ng-container>
