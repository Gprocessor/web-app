<footer class="chat-footer">
  <div class="chat-footer__input-wrap">
    <div class="chat-footer__input-bar">
      <button type="button" class="chat-footer__icon-btn" aria-label="Attach file" disabled>
        <svg viewBox="0 0 24 24">
          <path
            d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"
          />
        </svg>
      </button>
      <input
        #messageInput
        [(ngModel)]="userInput"
        (keydown)="onKeyDown($event)"
        placeholder="Ask about clients, loans, or accounts..."
        [disabled]="isStreaming"
        class="chat-footer__input"
      />
      <div class="chat-footer__actions">
        <button type="button" class="chat-footer__icon-btn" aria-label="Voice input" disabled>
          <svg viewBox="0 0 24 24">
            <path
              d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"
            />
          </svg>
        </button>
        <button
          type="button"
          *ngIf="!isStreaming"
          [disabled]="!userInput.trim()"
          (click)="submit()"
          class="chat-footer__send"
          aria-label="Send message"
        >
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" /></svg>
        </button>
        <button
          type="button"
          *ngIf="isStreaming"
          (click)="stop.emit()"
          class="chat-footer__stop"
          aria-label="Stop generating"
        >
          <svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z" /></svg>
        </button>
      </div>
    </div>
  </div>
  <p class="chat-footer__disclaimer">
    MIFOS INTELLIGENCE AI IS DESIGNED TO ASSIST, NOT REPLACE, HUMAN DECISION MAKING.
  </p>
</footer>
